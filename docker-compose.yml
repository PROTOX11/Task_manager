version: "3.8"

services:

  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  backend:
    image: prakash1142/mean-backend   # ✅ use Docker Hub image
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env   # ✅ use .env
    depends_on:
      - mongodb
    networks:
      - app-network

  frontend:
    image: prakash1142/mean-frontend  # ✅ use Docker Hub image
    container_name: frontend
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge